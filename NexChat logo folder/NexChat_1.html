<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexChat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --void:#080808;--surface:#0f0f0f;--raised:#171717;--hover:#1f1f1f;
  --border:#232323;--border2:#2e2e2e;
  --accent:#00e87a;--accent-d:rgba(0,232,122,.10);--accent-g:rgba(0,232,122,.22);
  --text1:#eeeeee;--text2:#888888;--text3:#444444;
  --own:#00321c;--own-b:#005530;--other:#1a1a1a;
  --danger:#ff4455;--warn:#ffaa00;
  --ff:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:9px;--r2:14px;
}
html,body{height:100%;background:var(--void);color:var(--text1);font-family:var(--ff);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.hidden{display:none!important;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:9999;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;background:var(--raised);border:1px solid var(--border2);color:var(--text1);}
#toast.show{opacity:1;}
#toast.ok{border-color:var(--accent-g);color:var(--accent);}
#toast.err{border-color:rgba(255,68,85,.35);color:var(--danger);}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:8000;display:flex;align-items:center;justify-content:center;}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:28px;width:400px;max-width:90vw;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;}
.modal-input{width:100%;background:var(--raised);border:1px solid var(--border2);border-radius:var(--r);padding:10px 14px;color:var(--text1);font-family:var(--ff);font-size:14px;outline:none;margin-top:12px;transition:border-color .2s;}
.modal-input:focus{border-color:var(--accent);}
.btn-cancel{background:var(--raised);border:1px solid var(--border2);color:var(--text2);border-radius:var(--r);padding:9px 18px;font-family:var(--ff);font-size:13px;cursor:pointer;transition:background .15s;}
.btn-cancel:hover{background:var(--hover);}

/* ── RIGHT-CLICK CONTEXT MENU ── */
#ctx-menu{
  position:fixed;z-index:9000;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--r2);padding:6px;min-width:160px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  animation:menuIn .12s ease;
}
@keyframes menuIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.ctx-item{
  display:flex;align-items:center;gap:9px;padding:9px 12px;
  border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text1);
  transition:background .12s;
}
.ctx-item:hover{background:var(--hover);}
.ctx-item.danger{color:var(--danger);}
.ctx-item.danger:hover{background:rgba(255,68,85,.1);}
.ctx-item svg{width:14px;height:14px;flex-shrink:0;}
.ctx-sep{height:1px;background:var(--border);margin:4px 0;}

/* ══════════════════════════════
   LOGIN
══════════════════════════════ */
#vLogin{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--void);z-index:100;}
.l-wrap{width:360px;}
.l-logo{text-align:center;margin-bottom:34px;}
.l-mark{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:14px;background:var(--accent-d);border:1px solid var(--accent-g);margin-bottom:12px;}
.l-mark svg{width:24px;height:24px;color:var(--accent);}
.l-logo h1{font-family:var(--mono);font-size:20px;font-weight:600;letter-spacing:-1px;}
.l-logo p{font-size:12px;color:var(--text2);margin-top:4px;}
.l-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:28px;}
.l-field{margin-bottom:16px;}
.l-field label{display:block;font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--text2);margin-bottom:7px;}
.l-field input{width:100%;background:var(--raised);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;color:var(--text1);font-family:var(--ff);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;}
.l-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-d);}
.l-field input::placeholder{color:var(--text3);}
.l-btn{width:100%;padding:12px;background:var(--accent);color:#000;border:none;border-radius:var(--r);font-family:var(--ff);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:opacity .2s,transform .1s;}
.l-btn:hover{opacity:.88;}
.l-btn:active{transform:scale(.98);}
.l-btn:disabled{opacity:.4;cursor:not-allowed;}
.l-err{margin-top:14px;padding:10px 14px;background:rgba(255,68,85,.09);border:1px solid rgba(255,68,85,.28);border-radius:var(--r);color:var(--danger);font-size:13px;text-align:center;}

/* ══════════════════════════════
   CHAT
══════════════════════════════ */
#vChat{position:fixed;inset:0;display:flex;background:var(--void);}
.c-side{width:285px;min-width:285px;display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);}
.c-head{padding:14px 12px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.c-appname{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);}
.c-head-right{display:flex;align-items:center;gap:6px;}
.uid-pill{font-size:11px;color:var(--text2);background:var(--raised);border:1px solid var(--border);border-radius:20px;padding:3px 10px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.i-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:5px;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
.i-btn:hover{background:var(--hover);color:var(--text1);}
.i-btn svg{width:16px;height:16px;}
.admin-back-btn{background:var(--accent-d);border:1px solid var(--accent-g);color:var(--accent);border-radius:7px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:var(--ff);transition:opacity .15s;}
.admin-back-btn:hover{opacity:.75;}
.admin-back-btn svg{width:13px;height:13px;}
.c-search{padding:10px 10px 6px;}
.c-search input{width:100%;background:var(--raised);border:1px solid var(--border);border-radius:20px;padding:7px 14px;color:var(--text1);font-family:var(--ff);font-size:13px;outline:none;transition:border-color .2s;}
.c-search input:focus{border-color:var(--border2);}
.c-search input::placeholder{color:var(--text3);}
.s-label{padding:8px 14px 4px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);}
.g-list{flex:1;overflow-y:auto;padding:4px 6px;}
.g-item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:var(--r);cursor:pointer;transition:background .15s;}
.g-item:hover{background:var(--hover);}
.g-item.active{background:var(--accent-d);}
.g-item.active .g-name{color:var(--accent);}
.g-avatar{width:38px;height:38px;border-radius:50%;background:var(--raised);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.g-item.active .g-avatar{background:var(--accent-d);border-color:var(--accent-g);}
.g-info{flex:1;min-width:0;}
.g-name{font-size:13px;font-weight:500;color:var(--text1);}
.g-last{font-size:11px;color:var(--text2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rt-bar{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.rt-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 5px var(--accent);flex-shrink:0;animation:blink 2.2s ease-in-out infinite;}
.rt-dot.off{background:var(--text3);box-shadow:none;animation:none;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* main */
.c-main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--void);}
.no-group{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:14px;text-align:center;padding:40px;}
.no-group svg{width:52px;height:52px;opacity:.1;}
.no-group h3{font-size:16px;font-weight:500;color:var(--text2);}
.no-group p{font-size:13px;max-width:240px;}
#activeChat{flex-direction:column;height:100%;}
.c-topbar{height:56px;min-height:56px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);background:var(--surface);gap:10px;}
.c-topbar .g-avatar{width:34px;height:34px;font-size:13px;}
.c-top-info{flex:1;min-width:0;}
.c-top-info .t-name{font-size:14px;font-weight:600;}
.c-top-info .t-sub{font-size:11px;color:var(--accent);}
.c-topbar-actions{display:flex;gap:6px;}
.msg-area{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:2px;}

/* ── MESSAGES ── */
.msg-row{display:flex;max-width:68%;margin-bottom:1px;}
.msg-row.own{align-self:flex-end;flex-direction:row-reverse;}
.msg-row.other{align-self:flex-start;}
.bubble{padding:8px 12px;border-radius:12px;max-width:100%;word-break:break-word;cursor:context-menu;user-select:text;}
.msg-row.own   .bubble{background:var(--own);border:1px solid var(--own-b);border-bottom-right-radius:3px;}
.msg-row.other .bubble{background:var(--other);border:1px solid var(--border);border-bottom-left-radius:3px;}
.bubble:hover{filter:brightness(1.08);}
.b-sender{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:3px;letter-spacing:.3px;}
.b-text{font-size:14px;color:var(--text1);line-height:1.45;}
.b-text.edited{font-style:italic;}
.b-footer{display:flex;align-items:center;justify-content:flex-end;gap:5px;margin-top:4px;}
.b-time{font-size:10px;color:var(--text3);}
/* ── TICKS ── */
.b-ticks{display:flex;align-items:center;gap:1px;}
.tick{font-size:12px;line-height:1;}
.tick.single{color:var(--text3);}
.tick.double{color:var(--accent);}
.edited-label{font-size:10px;color:var(--text3);font-style:italic;}

.empty-msg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:10px;text-align:center;}
.empty-msg svg{width:40px;height:40px;opacity:.12;}
.c-input-bar{padding:10px 12px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px;align-items:flex-end;}
.c-input-bar textarea{flex:1;background:var(--raised);border:1px solid var(--border);border-radius:20px;padding:9px 15px;color:var(--text1);font-family:var(--ff);font-size:14px;outline:none;resize:none;max-height:110px;min-height:38px;line-height:1.4;transition:border-color .2s;overflow-y:auto;}
.c-input-bar textarea:focus{border-color:var(--border2);}
.c-input-bar textarea::placeholder{color:var(--text3);}
.send-btn{width:38px;height:38px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s,transform .1s;}
.send-btn:hover{opacity:.82;}
.send-btn:active{transform:scale(.9);}
.send-btn svg{width:16px;height:16px;color:#000;}

/* ══════════════════════════════
   ADMIN
══════════════════════════════ */
#vAdmin{position:fixed;inset:0;display:flex;background:var(--void);}
.a-side{width:210px;min-width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.a-brand{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.a-brand .a-logo{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);}
.a-brand .a-sub{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.a-nav{flex:1;padding:10px;display:flex;flex-direction:column;gap:2px;}
.a-nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);transition:background .15s,color .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--ff);}
.a-nav-item:hover{background:var(--hover);color:var(--text1);}
.a-nav-item.active{background:var(--accent-d);color:var(--accent);}
.a-nav-item svg{width:15px;height:15px;flex-shrink:0;}
.a-sep{height:1px;background:var(--border);margin:6px 0;}
.a-foot{padding:10px;border-top:1px solid var(--border);}
.a-main{flex:1;overflow-y:auto;padding:26px 28px;min-width:0;}
.a-page-title{font-size:18px;font-weight:600;margin-bottom:4px;}
.a-page-sub{font-size:13px;color:var(--text2);margin-bottom:22px;}
.a-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:18px;}
.a-card-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.a-card-head h3{font-size:13px;font-weight:600;}
.a-card-head span{font-size:12px;color:var(--text2);}
.a-form-row{display:flex;gap:8px;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.a-form-row input,.a-form-row select{background:var(--raised);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;color:var(--text1);font-family:var(--ff);font-size:13px;outline:none;transition:border-color .2s;min-width:0;}
.a-form-row input:focus,.a-form-row select:focus{border-color:var(--accent);}
.a-form-row input::placeholder{color:var(--text3);}
.a-form-row select{cursor:pointer;}
.a-form-row select option{background:var(--raised);}
.a-table{width:100%;border-collapse:collapse;}
.a-table th{padding:9px 18px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);}
.a-table td{padding:11px 18px;font-size:13px;color:var(--text1);border-bottom:1px solid var(--border);}
.a-table tr:last-child td{border-bottom:none;}
.a-table tbody tr:hover td{background:var(--hover);}
.badge{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.badge.admin{background:rgba(0,232,122,.13);color:var(--accent);border:1px solid var(--accent-g);}
.badge.user{background:var(--raised);color:var(--text2);border:1px solid var(--border);}
.btn-p{background:var(--accent);color:#000;border:none;border-radius:var(--r);padding:8px 16px;font-family:var(--ff);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;white-space:nowrap;flex-shrink:0;}
.btn-p:hover{opacity:.82;}
.btn-p:disabled{opacity:.35;cursor:not-allowed;}
.btn-sm{background:var(--raised);color:var(--text2);border:1px solid var(--border);border-radius:6px;padding:5px 11px;font-family:var(--ff);font-size:12px;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap;}
.btn-sm:hover{background:var(--hover);color:var(--text1);}
.btn-danger{background:rgba(255,68,85,.1);color:var(--danger);border:1px solid rgba(255,68,85,.25);border-radius:6px;padding:5px 11px;font-family:var(--ff);font-size:12px;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.btn-danger:hover{opacity:.7;}
.btn-warn{background:rgba(255,170,0,.1);color:var(--warn);border:1px solid rgba(255,170,0,.25);border-radius:6px;padding:5px 11px;font-family:var(--ff);font-size:12px;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.btn-warn:hover{opacity:.7;}
.inline-input{background:var(--raised);border:1px solid var(--accent);border-radius:6px;padding:4px 10px;color:var(--text1);font-family:var(--ff);font-size:13px;outline:none;width:150px;}
.member-chip{display:inline-flex;align-items:center;gap:5px;background:var(--raised);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px;margin:2px;}
.member-chip button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;line-height:1;padding:0 0 0 2px;transition:color .15s;}
.member-chip button:hover{color:var(--danger);}
.members-section{background:var(--void);border-top:1px solid var(--border);}
.members-section td{padding:12px 18px 16px!important;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-box{display:flex;align-items:center;justify-content:center;padding:40px 0;}
.td-actions{display:flex;gap:6px;align-items:center;}

/* ══════════════════════════════
   NOTIFICATION BELL
══════════════════════════════ */
#notif-btn{position:relative;}
#notif-badge{
  position:absolute;top:-3px;right:-3px;
  width:8px;height:8px;border-radius:50%;
  background:var(--danger);border:2px solid var(--surface);
  display:none;
}
#notif-badge.show{display:block;}

/* ══════════════════════════════
   MOBILE LAYOUT  ≤640px
══════════════════════════════ */
@media(max-width:640px){
  #vChat{position:fixed;inset:0;overflow:hidden;}

  /* ── SIDEBAR: full screen, visible by default (groups screen) ── */
  .c-side{
    position:fixed;inset:0;z-index:10;
    width:100%!important;min-width:unset!important;
    transform:translateX(0);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
  }
  /* When chat is open — slide sidebar out to left */
  #vChat.mob-chat-open .c-side{
    transform:translateX(-100%);
    pointer-events:none;
  }

  /* ── MAIN: full screen, starts hidden (off right) ── */
  .c-main{
    position:fixed;inset:0;z-index:10;
    width:100%!important;
    transform:translateX(100%);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
  }
  /* When chat is open — slide main in from right */
  #vChat.mob-chat-open .c-main{
    transform:translateX(0);
  }

  /* No overlay needed — full screen swap */
  #mob-overlay{display:none!important;}

  /* Hamburger — hidden (not needed anymore) */
  #mob-menu-btn{display:none!important;}

  /* Back button — shown in topbar */
  #mob-back-btn{display:flex!important;}

  /* Input bar */
  .c-input-bar{padding:8px 10px;padding-bottom:calc(8px + env(safe-area-inset-bottom));}
  .c-input-bar textarea{font-size:16px!important;}
  .send-btn{width:42px;height:42px;}

  /* Bubbles */
  .msg-row{max-width:88%;}

  /* Topbar */
  .c-topbar{padding:0 10px;}

  /* Login */
  .l-wrap{width:90%;max-width:380px;}
}

/* Desktop — hide mobile-only elements */
#mob-menu-btn{display:none;}
#mob-back-btn{display:none;}
#mob-overlay{display:none;}

/* ══════════════════════════════
   ADMIN PANEL MOBILE
══════════════════════════════ */
@media(max-width:640px){
  #vAdmin{flex-direction:column;}

  /* Nav sidebar — full screen, shown by default */
  .a-side{
    position:fixed;inset:0;z-index:10;
    width:100%!important;min-width:unset!important;
    transform:translateX(0);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
    overflow-y:auto;
  }
  #vAdmin.mob-admin-open .a-side{
    transform:translateX(-100%);
    pointer-events:none;
  }

  /* Main content — full screen, starts off-screen right */
  .a-main{
    position:fixed;inset:0;z-index:10;
    padding:16px;
    transform:translateX(100%);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
  }
  #vAdmin.mob-admin-open .a-main{
    transform:translateX(0);
  }

  /* Back button in admin main area */
  #mob-admin-back{
    display:flex;align-items:center;gap:6px;
    background:none;border:none;color:var(--accent);
    font-size:14px;font-weight:600;cursor:pointer;
    padding:0 0 14px 0;
  }
}
</style>
</head>
<body>

<div id="toast"></div>
<div id="modal-overlay" class="hidden"></div>
<div id="ctx-menu" class="hidden"></div>

<!-- LOGIN -->
<div id="vLogin">
  <div class="l-wrap">
    <div class="l-logo">
      <div class="l-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h1>NexChat</h1>
      <p>Secure team messaging</p>
    </div>
    <div class="l-card">
      <!-- Tabs -->
      <div style="display:flex;gap:0;margin-bottom:22px;background:var(--raised);border:1px solid var(--border);border-radius:var(--r);padding:3px;">
        <button id="tabLogin" onclick="switchTab('login')" style="flex:1;padding:8px;border:none;border-radius:6px;font-family:var(--ff);font-size:13px;font-weight:600;cursor:pointer;background:var(--accent);color:#000;transition:all .2s;">Sign In</button>
        <button id="tabSignup" onclick="switchTab('signup')" style="flex:1;padding:8px;border:none;border-radius:6px;font-family:var(--ff);font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--text2);transition:all .2s;">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div id="formLogin">
        <div class="l-field">
          <label>User ID</label>
          <input type="text" id="lUser" placeholder="Enter your user ID" autocomplete="off"/>
        </div>
        <div class="l-field">
          <label>PIN / Password</label>
          <input type="password" id="lPin" placeholder="Enter your PIN"/>
        </div>
        <button class="l-btn" id="lBtn" onclick="doLogin()">Sign In</button>
        <div id="lErr" class="l-err hidden"></div>
        <div id="lRecent" class="hidden" style="margin-top:14px;padding:10px 14px;background:var(--raised);border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:center;gap:8px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span style="font-size:12px;color:var(--text2);">Last login: <span id="lRecentTime" style="color:var(--text1);font-weight:500;"></span></span></div>
      </div>

      <!-- Sign Up Form -->
      <div id="formSignup" class="hidden">
        <div class="l-field">
          <label>Choose a Username</label>
          <input type="text" id="sUser" placeholder="e.g. john_doe" autocomplete="off"/>
        </div>
        <div class="l-field">
          <label>Choose a Password</label>
          <input type="password" id="sPin" placeholder="Min 4 characters"/>
        </div>
        <div class="l-field">
          <label>Confirm Password</label>
          <input type="password" id="sPin2" placeholder="Re-enter password"/>
        </div>
        <button class="l-btn" id="sBtn" onclick="doSignup()">Request Account</button>
        <div id="sErr" class="l-err hidden"></div>
      </div>
    </div>
  </div>
</div>

<!-- Mobile sidebar overlay -->
<div id="mob-overlay" onclick="closeSidebar()"></div>

<!-- CHAT -->
<div id="vChat" class="hidden">
  <div class="c-side" id="cSide">
    <div class="c-head">
      <span class="c-appname">NexChat</span>
      <div class="c-head-right">
        <span class="uid-pill" id="sUid"></span>
        <button class="admin-back-btn hidden" id="adminBackBtn" onclick="goToAdmin()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Admin
        </button>
        <button class="i-btn" id="notif-btn" title="Notifications" onclick="toggleNotifications()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span id="notif-badge"></span>
        </button>
        <button class="i-btn" title="Logout" onclick="doLogout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
    <div class="c-search"><input type="text" placeholder="Search groups…" oninput="filterGroups(this.value)"/></div>
    <div class="s-label">My Groups</div>
    <div class="g-list" id="gList"><div class="load-box"><div class="spinner"></div></div></div>
    <div class="rt-bar">
      <div class="rt-dot" id="rtDot"></div>
      <span style="font-size:11px;color:var(--text3);">Live updates</span>
    </div>
  </div>
  <div class="c-main">
    <div class="no-group" id="noGroup">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <h3>Select a group</h3>
      <p>Choose a group from the sidebar to start chatting</p>
    </div>
    <div id="activeChat" class="hidden">
      <div class="c-topbar">
        <!-- Mobile: hamburger to open sidebar -->
        <button id="mob-menu-btn" class="i-btn" onclick="openSidebar()" style="margin-right:2px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <!-- Mobile: back to groups -->
        <button id="mob-back-btn" class="i-btn" onclick="mobGoBack()" style="margin-right:2px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="g-avatar" id="tAvatar"></div>
        <div class="c-top-info">
          <div class="t-name" id="tName"></div>
          <div class="t-sub" id="tSub">Active · Real-time</div>
        </div>
        <div class="c-topbar-actions" id="topbarActions"></div>
      </div>
      <div class="msg-area" id="msgArea"></div>
      <div class="c-input-bar">
        <textarea id="msgInput" placeholder="Type a message…" rows="1" onkeydown="onMsgKey(event)" oninput="autoH(this)"></textarea>
        <button class="send-btn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="vAdmin" class="hidden">
  <div class="a-side">
    <div class="a-brand">
      <div class="a-logo">NexChat</div>
      <div class="a-sub">Admin Console</div>
    </div>
    <div class="a-nav">
      <button class="a-nav-item active" id="navUsers" onclick="aNav('users')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </button>
      <button class="a-nav-item" id="navGroups" onclick="aNav('groups')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Groups
      </button>
      <button class="a-nav-item" id="navMessages" onclick="aNav('messages')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
        Messages
      </button>
      <button class="a-nav-item" id="navRequests" onclick="aNav('requests')" style="position:relative;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        Requests
        <span id="reqBadge" class="hidden" style="margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:1px 7px;min-width:18px;text-align:center;"></span>
      </button>
      <div class="a-sep"></div>
      <button class="a-nav-item" onclick="goToChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 10 20 15 15 20"/><path d="M4 4v7a4 4 0 0 0 4 4h12"/></svg>
        Go to Chat
      </button>
    </div>
    <div class="a-foot">
      <button class="a-nav-item" style="width:100%" onclick="doLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </div>
  <div class="a-main" id="aMain">
    <button id="mob-admin-back" onclick="mobAdminBack()" style="display:none;align-items:center;gap:6px;background:none;border:none;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;padding:0 0 14px 0;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
      Menu
    </button>
    <div id="aMainContent"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   SUPABASE
══════════════════════════════════════════ */
const SURL = 'https://rpcwbcgazwqfrqvuhyiz.supabase.co';
const SKEY = 'sb_publishable_p2keWbIOrczLSn4Ajpf7ew_cie5pwxx';
const sb   = supabase.createClient(SURL, SKEY);

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let me         = null;
let myGroups   = [];
let activeGrp  = null;
let msgCache   = {};        // { gId: [msgs] }
let readsCache = {};        // { gId: { msgId: Set(userIds) } }
let memberCache= {};        // { gId: [userIds] }
let rtChannel  = null;
let sessCheckInterval = null;

/* ══════════════════════════════════════════
   SESSION RESTORE
══════════════════════════════════════════ */
(function init(){
  const s = localStorage.getItem('nc_me');
  if(s){ me=JSON.parse(s); me.role==='admin'?showAdmin('users'):showChat(); }
})();

/* ══════════════════════════════════════════
   VIEWS
══════════════════════════════════════════ */
function showView(n){['vLogin','vChat','vAdmin'].forEach(id=>G(id).classList.toggle('hidden',id!==n));}
function showChat(){
  showView('vChat');
  G('sUid').textContent=me.id;
  G('adminBackBtn').classList.toggle('hidden',me.role!=='admin');
  loadChatGroups();
  initRT();
  startSessionCheck();
  // Restore notification state
  if(notifEnabled) initNotifSound();
  updateNotifBtn();
}
function showAdmin(s){ showView('vAdmin'); G('vAdmin').classList.remove('mob-admin-open'); aNav(s||'users'); loadPendingBadge(); startSessionCheck(); }
function goToAdmin(){ showAdmin('users'); }
function goToChat(){
  showView('vChat');
  G('sUid').textContent=me.id;
  G('adminBackBtn').classList.toggle('hidden',me.role!=='admin');
  G('vChat').classList.remove('mob-chat-open'); // mobile: show groups list
  loadChatGroups();
  if(!rtChannel) initRT();
  startSessionCheck();
}

/* ══════════════════════════════════════════
   SESSION VALIDATION
══════════════════════════════════════════ */
async function checkSession(){
  if(!me||!me.token) return;
  try{
    const{data}=await sb.from('users').select('session_token').eq('id',me.id).maybeSingle();
    if(!data||data.session_token!==me.token){
      // Token mismatch — doosri jagah login ho gaya
      doLogout(true);
    }
  }catch(_){}
}
function startSessionCheck(){
  if(sessCheckInterval) clearInterval(sessCheckInterval);
  // Har 15 second mein check karo
  sessCheckInterval=setInterval(checkSession, 15000);
}

/* ══════════════════════════════════════════
   LOGIN / SIGNUP TABS
══════════════════════════════════════════ */
function switchTab(tab){
  const isLogin=tab==='login';
  G('formLogin').classList.toggle('hidden',!isLogin);
  G('formSignup').classList.toggle('hidden',isLogin);
  G('tabLogin').style.background=isLogin?'var(--accent)':'transparent';
  G('tabLogin').style.color=isLogin?'#000':'var(--text2)';
  G('tabSignup').style.background=isLogin?'transparent':'var(--accent)';
  G('tabSignup').style.color=isLogin?'var(--text2)':'#000';
}

/* ══════════════════════════════════════════
   SIGN UP
══════════════════════════════════════════ */
async function doSignup(){
  const uid=(G('sUser').value||'').trim();
  const pin=(G('sPin').value||'').trim();
  const pin2=(G('sPin2').value||'').trim();
  const errEl=G('sErr');
  errEl.classList.add('hidden');
  const setErr2=m=>{errEl.textContent=m;errEl.classList.remove('hidden');};
  if(!uid){setErr2('Username required.');return;}
  if(uid.length<3){setErr2('Username must be at least 3 characters.');return;}
  if(!pin){setErr2('Password required.');return;}
  if(pin.length<4){setErr2('Password must be at least 4 characters.');return;}
  if(pin!==pin2){setErr2('Passwords do not match.');return;}
  const btn=G('sBtn');
  btn.disabled=true; btn.textContent='Submitting…';
  try{
    // Check if username already taken (in users or pending requests)
    const{data:ex}=await sb.from('users').select('id').eq('id',uid).maybeSingle();
    if(ex){setErr2('This username is already taken.');return;}
    // Insert with status = pending
    const{error}=await sb.from('users').insert({id:uid,pin,role:'user',status:'pending'});
    if(error) throw error;
    G('sUser').value=''; G('sPin').value=''; G('sPin2').value='';
    errEl.classList.add('hidden');
    // Show success message
    errEl.style.background='rgba(0,232,122,.09)';
    errEl.style.borderColor='rgba(0,232,122,.28)';
    errEl.style.color='var(--accent)';
    errEl.textContent='Request sent! Please wait for admin approval before logging in.';
    errEl.classList.remove('hidden');
    setTimeout(()=>{
      errEl.style.background='';errEl.style.borderColor='';errEl.style.color='';
      errEl.classList.add('hidden');
      switchTab('login');
    },3500);
  }catch(e){setErr2('Failed: '+(e.message||e));}
  finally{btn.disabled=false;btn.textContent='Request Account';}
}

/* ══════════════════════════════════════════
   LOGIN
══════════════════════════════════════════ */
function genToken(){return crypto.randomUUID();}

async function doLogin(){
  const uid=val('lUser'), pin=val('lPin');
  G('lErr').classList.add('hidden');
  if(!uid||!pin){setErr('Enter both User ID and PIN.');return;}
  const btn=G('lBtn');
  btn.disabled=true; btn.textContent='Signing in…';
  try{
    const{data,error}=await sb.from('users').select('id,role,status').eq('id',uid).eq('pin',pin).maybeSingle();
    if(error) throw error;
    if(!data){setErr('Invalid User ID or PIN.');return;}
    if(data.status==='pending'){setErr('Your account is pending admin approval. Please wait.');return;}
    if(data.status==='rejected'){setErr('Your signup request was rejected. Contact admin.');return;}
    // Generate new session token and save to DB — kicks out any existing session
    const token=genToken();
    const{error:te}=await sb.from('users').update({session_token:token}).eq('id',data.id);
    if(te) throw te;
    me={id:data.id,role:data.role,token};
    localStorage.setItem('nc_me',JSON.stringify(me));
    localStorage.setItem('nc_lastlogin_'+me.id, new Date().toISOString());
    me.role==='admin'?showAdmin('users'):showChat();
  }catch(e){setErr('Connection error. Try again.');console.error(e);}
  finally{btn.disabled=false;btn.textContent='Sign In';}
}
function setErr(m){const e=G('lErr');e.textContent=m;e.classList.remove('hidden');}
G('lPin').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
G('lUser').addEventListener('keydown',e=>{if(e.key==='Enter')G('lPin').focus();});
G('sPin').addEventListener('keydown',e=>{if(e.key==='Enter')G('sPin2').focus();});
G('sPin2').addEventListener('keydown',e=>{if(e.key==='Enter')doSignup();});
G('sUser').addEventListener('keydown',e=>{if(e.key==='Enter')G('sPin').focus();});
G('lUser').addEventListener('input',function(){
  const uid=this.value.trim();
  const stored=uid?localStorage.getItem('nc_lastlogin_'+uid):null;
  const rec=G('lRecent'),tim=G('lRecentTime');
  if(stored&&rec&&tim){
    const d=new Date(stored);
    const now=new Date();
    const diff=Math.floor((now-d)/60000);
    let label;
    if(diff<1) label='Just now';
    else if(diff<60) label=diff+'m ago';
    else if(diff<1440) label=Math.floor(diff/60)+'h ago';
    else label=Math.floor(diff/1440)+'d ago — '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    tim.textContent=label;
    rec.classList.remove('hidden');
  } else if(rec){ rec.classList.add('hidden'); }
});

/* ══════════════════════════════════════════
   LOGOUT
══════════════════════════════════════════ */
async function doLogout(kicked=false){
  if(me&&me.id&&!kicked){
    // Only clear token if user manually logs out — not when kicked
    try{ await sb.from('users').update({session_token:null}).eq('id',me.id); }catch(_){}
  }
  localStorage.removeItem('nc_me');
  me=null;activeGrp=null;msgCache={};readsCache={};memberCache={};myGroups=[];
  if(rtChannel){sb.removeChannel(rtChannel);rtChannel=null;}
  if(sessCheckInterval){clearInterval(sessCheckInterval);sessCheckInterval=null;}
  G('gList').innerHTML='<div class="load-box"><div class="spinner"></div></div>';
  G('noGroup').classList.remove('hidden');
  G('activeChat').classList.add('hidden');
  G('vChat').classList.remove('mob-chat-open');
  G('mob-overlay').classList.remove('show');
  closeCtxMenu();
  showView('vLogin');
  if(kicked) showToast('You were signed in from another device.','err');
}

/* ══════════════════════════════════════════
   LOAD GROUPS (chat sidebar)
══════════════════════════════════════════ */
async function loadChatGroups(){
  G('gList').innerHTML='<div class="load-box"><div class="spinner"></div></div>';
  try{
    if(me.role==='admin'){
      const{data,error}=await sb.from('groups').select('*').order('id');
      if(error) throw error;
      myGroups=data||[];
    } else {
      const{data:mRows,error:mErr}=await sb.from('group_members').select('group_id').eq('user_id',me.id);
      if(mErr) throw mErr;
      const ids=(mRows||[]).map(r=>r.group_id);
      if(!ids.length){myGroups=[];}
      else{
        const{data:grps,error:gErr}=await sb.from('groups').select('*').in('id',ids).order('id');
        if(gErr) throw gErr;
        myGroups=grps||[];
      }
    }
    renderChatGroups(myGroups);
  }catch(e){
    console.error(e);
    G('gList').innerHTML='<div style="padding:16px;color:var(--danger);font-size:13px;">Failed to load groups.</div>';
  }
}

function renderChatGroups(list){
  if(!list.length){
    G('gList').innerHTML=`<div style="padding:20px;color:var(--text3);font-size:13px;text-align:center;">${me.role==='admin'?'No groups yet.':'You have no assigned groups yet.'}</div>`;
    return;
  }
  G('gList').innerHTML=list.map(g=>{
    const isActive=activeGrp&&activeGrp.id===g.id;
    return `<div class="g-item${isActive?' active':''}" onclick="selectGroup(${g.id},'${escA(g.name)}')">
      <div class="g-avatar">${grpEmoji(g.name)}</div>
      <div class="g-info">
        <div class="g-name">${esc(g.name)}</div>
        <div class="g-last" id="gl-${g.id}">Click to open</div>
      </div>
    </div>`;
  }).join('');
}

function filterGroups(q){
  renderChatGroups(q?myGroups.filter(g=>g.name.toLowerCase().includes(q.toLowerCase())):myGroups);
}

/* ══════════════════════════════════════════
   SELECT GROUP
══════════════════════════════════════════ */
async function selectGroup(gId,gName){
  if(activeGrp&&activeGrp.id===gId){ closeSidebar(); return; }
  activeGrp={id:gId,name:gName};
  closeSidebar(); // auto-close sidebar on mobile
  renderChatGroups(myGroups);
  G('noGroup').classList.add('hidden');
  const ac=G('activeChat');
  ac.classList.remove('hidden'); ac.style.display='flex';
  G('tName').textContent=gName;
  G('tAvatar').textContent=grpEmoji(gName);
  G('tSub').textContent='Loading…';
  G('msgArea').innerHTML='<div class="load-box"><div class="spinner"></div></div>';

  // Admin clear chat button
  G('topbarActions').innerHTML=me.role==='admin'
    ?`<button class="btn-warn" onclick="clearChat(${gId},'${escA(gName)}')">🗑 Clear Chat</button>`
    :'';

  // Load members for this group (needed for seen logic)
  await loadGroupMembers(gId);
  // Load reads
  await loadReads(gId);
  // Load messages
  await fetchMessages(gId);
  // Mark all as seen
  await markSeen(gId);
  G('tSub').textContent='Active · Real-time';
}

/* ══════════════════════════════════════════
   GROUP MEMBERS CACHE
══════════════════════════════════════════ */
async function loadGroupMembers(gId){
  try{
    if(me.role==='admin'){
      // Admin: get all users
      const{data}=await sb.from('users').select('id');
      memberCache[gId]=(data||[]).map(u=>u.id);
    } else {
      const{data}=await sb.from('group_members').select('user_id').eq('group_id',gId);
      memberCache[gId]=(data||[]).map(m=>m.user_id);
    }
  }catch(e){console.error('members load',e);}
}

/* ══════════════════════════════════════════
   READS / SEEN
══════════════════════════════════════════ */
async function loadReads(gId){
  try{
    // Get all message IDs in this group first (only messages already in cache or from DB)
    const msgs=msgCache[gId]||[];
    if(!msgs.length){ readsCache[gId]={}; return; }
    const msgIds=msgs.map(m=>m.id).filter(id=>!String(id).startsWith('temp_'));
    if(!msgIds.length){ readsCache[gId]={}; return; }
    const{data,error}=await sb.from('message_reads').select('message_id,user_id').in('message_id',msgIds);
    if(error) throw error;
    readsCache[gId]={};
    (data||[]).forEach(r=>{
      if(!readsCache[gId][r.message_id]) readsCache[gId][r.message_id]=new Set();
      readsCache[gId][r.message_id].add(r.user_id);
    });
  }catch(e){console.error('reads load',e);}
}

async function markSeen(gId){
  // Insert read records for all messages in this group that user hasn't read yet
  const msgs=msgCache[gId]||[];
  if(!msgs.length) return;
  const toInsert=[];
  msgs.forEach(m=>{
    if(String(m.id).startsWith('temp_')) return;
    const readers=readsCache[gId]&&readsCache[gId][m.id];
    if(!readers||!readers.has(me.id)){
      toInsert.push({message_id:m.id,user_id:me.id});
    }
  });
  if(!toInsert.length) return;
  try{
    await sb.from('message_reads').upsert(toInsert,{onConflict:'message_id,user_id',ignoreDuplicates:true});
    // Update local cache
    toInsert.forEach(r=>{
      if(!readsCache[gId][r.message_id]) readsCache[gId][r.message_id]=new Set();
      readsCache[gId][r.message_id].add(me.id);
    });
  }catch(e){console.error('markSeen',e);}
}

function isSeenByAll(gId, msgId){
  const members=memberCache[gId]||[];
  if(!members.length) return false;
  const readers=readsCache[gId]&&readsCache[gId][msgId];
  if(!readers) return false;
  // Every member must have read it
  return members.every(uid=>readers.has(uid));
}

/* ══════════════════════════════════════════
   FETCH & RENDER MESSAGES
══════════════════════════════════════════ */
async function fetchMessages(gId){
  try{
    const{data,error}=await sb.from('messages').select('*').eq('group_id',gId).order('id',{ascending:true});
    if(error) throw error;

    console.error(e);
    G('msgArea').innerHTML='<div style="padding:20px;color:var(--danger);font-size:13px;text-align:center;">Failed to load messages.</div>';
  }
}
function fmtTime(ts){
  if(!ts) return '';

  const d = new Date(ts);

  // 👉 IST offset add (5h 30m)
  d.setMinutes(d.getMinutes() + 330);

  const now = new Date();
  now.setMinutes(now.getMinutes() + 330);

  const isToday = d.toDateString() === now.toDateString();

  const y = new Date(now);
  y.setDate(now.getDate() - 1);

  const isYesterday = d.toDateString() === y.toDateString();

  const t = d.toLocaleTimeString("en-IN", {
    hour: "2-digit",
    minute: "2-digit",
    hour12: true
  });

  if(isToday) return t;
  if(isYesterday) return 'Yesterday ' + t;

  return d.toLocaleDateString("en-IN") + ' ' + t;
}
function renderMessages(gId){
  if(!activeGrp||activeGrp.id!==gId) return;
  const msgs=msgCache[gId]||[];
  const area=G('msgArea');
  if(!msgs.length){
    area.innerHTML=`<div class="empty-msg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span style="font-size:13px;">No messages yet. Say hello!</span></div>`;
    return;
  }
  const scrolledToBottom=area.scrollHeight-area.scrollTop-area.clientHeight<60;
  area.innerHTML=msgs.map((m,i)=>{
    const own=m.user_id===me.id;
    const isAdmin=me.role==='admin';
    const prev=msgs[i-1];
    const showSender=!own&&(!prev||prev.user_id!==m.user_id);
    const isTemp=String(m.id).startsWith('temp_');
    const timeStr=isTemp?'Sending…':fmtTime(m.created_at);
    const edited=m.edited?'<span class="edited-label"> · edited</span>':'';

    // Ticks (only for own messages)
    let ticks='';
    if(own&&!isTemp){
      const seen=isSeenByAll(gId,m.id);
      ticks=`<span class="b-ticks">
        <span class="tick ${seen?'double':'single'}">✓</span>
        ${seen?'<span class="tick double">✓</span>':''}
      </span>`;
    }

    return `<div class="msg-row ${own?'own':'other'}" id="mr-${m.id}"
      oncontextmenu="showCtxMenu(event,${JSON.stringify(m.id)},${own},${isAdmin})">
      <div class="bubble">
        ${showSender?`<div class="b-sender">${esc(m.user_id)}</div>`:''}
        <div class="b-text${m.edited?' edited':''}" id="bt-${m.id}">${esc(m.content)}</div>
        <div class="b-footer">
          ${edited}
          <span class="b-time">${timeStr}</span>
          ${ticks}
        </div>
      </div>
    </div>`;
  }).join('');
  if(scrolledToBottom) area.scrollTop=area.scrollHeight;
  // Update sidebar preview
  const last=msgs[msgs.length-1];
  const el=G('gl-'+gId);
  if(el&&last) el.textContent=(last.user_id===me.id?'You: ':last.user_id+': ')+last.content;
}

/* ══════════════════════════════════════════
   SEND MESSAGE
══════════════════════════════════════════ */
async function sendMsg(){
  if(!activeGrp||!me) return;
  const input=G('msgInput');
  const content=input.value.trim();
  if(!content) return;
  input.value=''; input.style.height='';

  const tempId='temp_'+Date.now();
  const temp={id:tempId,group_id:activeGrp.id,user_id:me.id,content,created_at:new Date().toISOString(),edited:false};
  if(!msgCache[activeGrp.id]) msgCache[activeGrp.id]=[];
  msgCache[activeGrp.id].push(temp);
  renderMessages(activeGrp.id);

  try{
    const{data,error}=await sb.from('messages')
      .insert({group_id:activeGrp.id,user_id:me.id,content})
      .select().single();
    if(error) throw error;
    const arr=msgCache[activeGrp.id];
    const idx=arr.findIndex(m=>m.id===tempId);
    if(idx!==-1) arr[idx]=data;
    // Mark own message as read by self
    if(!readsCache[activeGrp.id]) readsCache[activeGrp.id]={};
    readsCache[activeGrp.id][data.id]=new Set([me.id]);
    renderMessages(activeGrp.id);
  }catch(e){
    console.error(e);
    showToast('Failed to send.','err');
    if(msgCache[activeGrp.id])
      msgCache[activeGrp.id]=msgCache[activeGrp.id].filter(m=>m.id!==tempId);
    renderMessages(activeGrp.id);
    input.value=content;
  }
}

function onMsgKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

function showCtxMenu(e,msgId,isOwn,isAdmin){
  e.preventDefault();
  closeCtxMenu();
  const msg=(msgCache[activeGrp&&activeGrp.id]||[]).find(m=>m.id==msgId||m.id===msgId);
  if(!msg) return;

  const canDelete= (isOwn||isAdmin) && !String(msgId).startsWith('temp_');

  let items=`
    <div class="ctx-item" onclick="copyMsg(${JSON.stringify(msg.content)})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy
    </div>`;
  if(canDelete) items+=`
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" onclick="deleteMsg(${JSON.stringify(msgId)})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      Delete
    </div>`;

  const menu=G('ctx-menu');
  menu.innerHTML=items;
  menu.classList.remove('hidden');

  // Position — keep inside viewport
  const vw=window.innerWidth, vh=window.innerHeight;
  let x=e.clientX, y=e.clientY;
  menu.style.left=x+'px'; menu.style.top=y+'px';
  requestAnimationFrame(()=>{
    const r=menu.getBoundingClientRect();
    if(r.right>vw) menu.style.left=(x-r.width)+'px';
    if(r.bottom>vh) menu.style.top=(y-r.height)+'px';
  });
}

function closeCtxMenu(){
  const m=G('ctx-menu'); m.classList.add('hidden'); m.innerHTML='';
}
document.addEventListener('click',()=>closeCtxMenu());
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCtxMenu();});

function copyMsg(content){
  navigator.clipboard.writeText(content).then(()=>showToast('Copied!','ok')).catch(()=>{
    // Fallback
    const ta=document.createElement('textarea');
    ta.value=content; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Copied!','ok');
  });
  closeCtxMenu();
}

async function deleteMsg(msgId){

/* ══════════════════════════════════════════
   REALTIME
══════════════════════════════════════════ */
function initRT(){
  if(rtChannel) return;
  rtChannel=sb.channel('nc-rt-'+Date.now())
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},async payload=>{
      const msg=payload.new;
      const gId=msg.group_id;
      if(!msgCache[gId]) msgCache[gId]=[];
      // Replace temp or add
      const tempIdx=msgCache[gId].findIndex(m=>
        String(m.id).startsWith('temp_')&&m.user_id===msg.user_id&&m.content===msg.content
      );
      if(tempIdx!==-1) msgCache[gId][tempIdx]=msg;
      else if(!msgCache[gId].find(m=>m.id===msg.id)) msgCache[gId].push(msg);

      if(activeGrp&&activeGrp.id===gId){
        // Mark new message as seen immediately if we're in the group
        if(!readsCache[gId]) readsCache[gId]={};
        if(!readsCache[gId][msg.id]) readsCache[gId][msg.id]=new Set();
        readsCache[gId][msg.id].add(me.id);
        // Persist seen
        try{ await sb.from('message_reads').upsert({message_id:msg.id,user_id:me.id},{onConflict:'message_id,user_id',ignoreDuplicates:true}); }catch(_){}
        renderMessages(gId);
      }
      // Notification — only for messages from others
      if(msg.user_id !== me.id){
        const grp = myGroups.find(g=>g.id===gId);
        const grpName = grp ? grp.name : 'a group';
        // Only notify if not currently viewing this group OR tab is not focused
        if(!activeGrp || activeGrp.id !== gId || !document.hasFocus()){
          triggerNotif(msg.user_id, msg.content, grpName);
        }
      }
      const el=G('gl-'+gId);
      if(el) el.textContent=(msg.user_id===me.id?'You: ':msg.user_id+': ')+msg.content;
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},payload=>{
      const msg=payload.new;
      const gId=msg.group_id;
      if(msgCache[gId]){
        const idx=msgCache[gId].findIndex(m=>m.id===msg.id);
        if(idx!==-1) msgCache[gId][idx]=msg;
        if(activeGrp&&activeGrp.id===gId) renderMessages(gId);
      }
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'messages'},payload=>{
      const old=payload.old;
      const gId=old.group_id;
      if(msgCache[gId]){
        msgCache[gId]=msgCache[gId].filter(m=>m.id!==old.id);
        if(activeGrp&&activeGrp.id===gId) renderMessages(gId);
      }
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'message_reads'},payload=>{
      const r=payload.new;
      // Find which group this message belongs to
      Object.keys(msgCache).forEach(gId=>{
        const msg=msgCache[gId].find(m=>m.id===r.message_id);
        if(msg){
          if(!readsCache[gId]) readsCache[gId]={};
          if(!readsCache[gId][r.message_id]) readsCache[gId][r.message_id]=new Set();
          readsCache[gId][r.message_id].add(r.user_id);
          if(activeGrp&&activeGrp.id===parseInt(gId)) renderMessages(parseInt(gId));
        }
      });
    })
    .subscribe(status=>{
      const dot=G('rtDot');
      if(dot) dot.classList.toggle('off',status!=='SUBSCRIBED');
    });
}

/* ══════════════════════════════════════════
   NOTIFICATIONS
══════════════════════════════════════════ */
let notifEnabled = localStorage.getItem('nc_notif') === '1';
let notifPermission = 'default'; // 'default' | 'granted' | 'denied'
let unreadCount = 0;
let notifSound = null;

// Init sound (short beep using Web Audio API — no file needed)
function initNotifSound(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    notifSound = ()=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.35);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime+0.35);
    };
  }catch(_){}
}

async function toggleNotifications(){
  if(!notifEnabled){
    // Try to enable
    await requestNotifPermission();
  } else {
    // Disable
    notifEnabled = false;
    localStorage.setItem('nc_notif','0');
    showToast('Notifications off','');
    updateNotifBtn();
  }
}

async function requestNotifPermission(){
  initNotifSound();
  if(!('Notification' in window)){
    showToast('Browser notifications not supported','err');
    notifEnabled = true;
    localStorage.setItem('nc_notif','1');
    updateNotifBtn();
    showToast('Sound notifications enabled!','ok');
    return;
  }
  if(Notification.permission === 'granted'){
    notifEnabled = true;
    localStorage.setItem('nc_notif','1');
    updateNotifBtn();
    showToast('Notifications enabled!','ok');
    return;
  }
  if(Notification.permission === 'denied'){
    showToast('Notifications blocked — enable in browser settings','err');
    notifEnabled = true;
    localStorage.setItem('nc_notif','1');
    updateNotifBtn();
    return;
  }
  const perm = await Notification.requestPermission();
  notifPermission = perm;
  if(perm === 'granted'){
    notifEnabled = true;
    localStorage.setItem('nc_notif','1');
    updateNotifBtn();
    showToast('Notifications enabled!','ok');
  } else {
    notifEnabled = true;
    localStorage.setItem('nc_notif','1');
    updateNotifBtn();
    showToast('Browser notifs blocked — sound only enabled','');
  }
}

function updateNotifBtn(){
  const btn = G('notif-btn');
  if(!btn) return;
  if(notifEnabled){
    btn.style.color='var(--accent)';
    btn.title='Notifications ON (click to disable)';
  } else {
    btn.style.color='';
    btn.title='Enable Notifications';
  }
}

function triggerNotif(senderName, msgText, groupName){
  if(!notifEnabled) return;

  // In-app sound
  if(notifSound) try{ notifSound(); }catch(_){}

  // Unread badge in title
  unreadCount++;
  document.title = `(${unreadCount}) NexChat`;
  const badge = G('notif-badge');
  if(badge){ badge.classList.add('show'); }

  // Browser push notification (only if tab not focused)
  if(!document.hasFocus() && Notification.permission === 'granted'){
    try{
      const n = new Notification(`${senderName} in ${groupName}`, {
        body: msgText.length > 80 ? msgText.slice(0,77)+'…' : msgText,
        icon: 'favicon-32x32.png',
        tag: 'nexchat-msg',
        silent: true, // we handle sound ourselves
      });
      n.onclick = ()=>{ window.focus(); n.close(); };
    }catch(_){}
  }
}

// Clear badge when user focuses window
window.addEventListener('focus', ()=>{
  if(unreadCount > 0){
    unreadCount = 0;
    document.title = 'NexChat';
    const badge = G('notif-badge');
    if(badge) badge.classList.remove('show');
  }
});

        </tr>`).join('')}</tbody>
      </table>`
    :'<div style="padding:16px;color:var(--text3);">No users found.</div>';
  }catch(e){const tb=G('usersBody');if(tb) tb.innerHTML='<div style="padding:16px;color:var(--danger);">Failed to load.</div>';}
}

async function createUser(){
  const uid=(G('nUid').value||'').trim();
  const pin=(G('nPin').value||'').trim();
  const role=G('nRole').value;
  if(!uid){showToast('Enter a User ID.','err');return;}
  if(!pin){showToast('Enter a PIN.','err');return;}
  try{
    const{data:ex}=await sb.from('users').select('id').eq('id',uid).maybeSingle();
    if(ex){showToast(`User "${uid}" already exists.`,'err');return;}
    const{error}=await sb.from('users').insert({id:uid,pin,role,status:'approved'});
    if(error) throw error;
    G('nUid').value=''; G('nPin').value='';
    showToast(`User "${uid}" created!`,'ok');
    await loadUsersTable();
  }catch(e){showToast('Failed: '+(e.message||e),'err');}
}

async function deleteUser(uid){
  showConfirm(`Delete user "${uid}"?`,'This removes the user and all their group memberships.',async()=>{
    try{
      await sb.from('group_members').delete().eq('user_id',uid);
      const{error}=await sb.from('users').delete().eq('id',uid);
      if(error) throw error;
      showToast(`User "${uid}" deleted.`,'ok');
      await loadUsersTable();
    }catch(e){showToast('Delete failed: '+(e.message||e),'err');}
  },'Delete User',true);
}

/* ══════════════════════════════════════════
   ADMIN — GROUPS
══════════════════════════════════════════ */
async function renderAdminGroups(){
  G('aMainContent').innerHTML=`
    <div class="a-page-title">Group Management</div>
    <div class="a-page-sub">Create groups, rename, assign/remove members.</div>
    <div class="a-card">
      <div class="a-card-head"><h3>Create New Group</h3></div>
      <div class="a-form-row">
        <input type="text" id="nGname" placeholder="Group name…" style="flex:1;"/>
        <button class="btn-p" onclick="createGroup()">Create Group</button>
      </div>
    </div>
    <div class="a-card">
      <div class="a-card-head"><h3>All Groups</h3><span id="gCount">Loading…</span></div>
      <div id="groupsBody"><div class="load-box"><div class="spinner"></div></div></div>
    </div>`;
  await loadGroupsTable();
}

async function loadGroupsTable(){
  try{
    const[gRes,mRes,uRes]=await Promise.all([
      sb.from('groups').select('*').order('id'),
      sb.from('group_members').select('*'),
      sb.from('users').select('id,role').order('id')
    ]);
    if(gRes.error) throw gRes.error;
    const groups=gRes.data||[],members=mRes.data||[],users=uRes.data||[];
    const el=G('gCount'); if(el) el.textContent=groups.length+' groups';
    const tb=G('groupsBody'); if(!tb) return;
    if(!groups.length){tb.innerHTML='<div style="padding:16px;color:var(--text3);">No groups yet.</div>';return;}

    let rows='';
    for(const g of groups){
      const gMembers=members.filter(m=>m.group_id===g.id);
      const chips=gMembers.map(m=>`<span class="member-chip">${esc(m.user_id)}<button onclick="removeMember(${g.id},'${escA(m.user_id)}')" title="Remove">×</button></span>`).join('')
        ||'<span style="font-size:12px;color:var(--text3);">No members</span>';
      const notIn=users.filter(u=>!gMembers.find(m=>m.user_id===u.id));
      const opts=notIn.map(u=>`<option value="${escA(u.id)}">${esc(u.id)}</option>`).join('');
      rows+=`
        <tr>
          <td style="color:var(--text3);font-family:var(--mono);font-size:11px;">${g.id}</td>
          <td id="gnc-${g.id}"><span>${esc(g.name)}</span></td>
          <td><div class="td-actions">
            <button class="btn-sm" onclick="startRename(${g.id},'${escA(g.name)}')">Rename</button>
            <button class="btn-danger" onclick="deleteGroup(${g.id},'${escA(g.name)}')">Delete</button>
          </div></td>
        </tr>
        <tr class="members-section">
          <td colspan="3">
            <div style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;">Members</div>
            <div id="mc-${g.id}" style="margin-bottom:10px;">${chips}</div>
            <div style="display:flex;gap:8px;align-items:center;">
              <select id="as-${g.id}" style="background:var(--raised);border:1px solid var(--border);border-radius:var(--r);padding:6px 12px;color:var(--text1);font-family:var(--ff);font-size:12px;outline:none;min-width:130px;">
                <option value="">Add user…</option>${opts}
              </select>
              <button class="btn-sm" onclick="addMember(${g.id})">Add to Group</button>
            </div>
          </td>
        </tr>`;
    }
    tb.innerHTML=`<table class="a-table"><thead><tr><th>ID</th><th>Name</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>`;
  }catch(e){
    console.error(e);
    const tb=G('groupsBody');if(tb) tb.innerHTML='<div style="padding:16px;color:var(--danger);">Failed to load.</div>';
  }
}

async function createGroup(){
  const name=(G('nGname').value||'').trim();
  if(!name){showToast('Enter a group name.','err');return;}
  try{
    const{error}=await sb.from('groups').insert({name});
    if(error) throw error;
    G('nGname').value='';
    showToast(`Group "${name}" created!`,'ok');
    await loadGroupsTable();
  }catch(e){showToast('Failed: '+(e.message||e),'err');}
}

function startRename(gId,current){
  const cell=G('gnc-'+gId);
  cell.innerHTML=`<input class="inline-input" id="ri-${gId}" value="${escA(current)}" onkeydown="onRenameKey(event,${gId})"/>
    <button class="btn-p" style="margin-left:8px;padding:5px 12px;font-size:12px;" onclick="saveRename(${gId})">Save</button>
    <button class="btn-sm" style="margin-left:4px;" onclick="cancelRename(${gId},'${escA(current)}')">Cancel</button>`;
  G('ri-'+gId).focus();
}
function onRenameKey(e,gId){if(e.key==='Enter')saveRename(gId);if(e.key==='Escape')cancelRename(gId,G('ri-'+gId).defaultValue);}
function cancelRename(gId,name){G('gnc-'+gId).innerHTML=`<span>${esc(name)}</span>`;}
async function saveRename(gId){
  const name=(G('ri-'+gId).value||'').trim();
  if(!name){showToast('Name cannot be empty.','err');return;}
  try{
    const{error}=await sb.from('groups').update({name}).eq('id',gId);
    if(error) throw error;
    G('gnc-'+gId).innerHTML=`<span>${esc(name)}</span>`;
    showToast('Group renamed!','ok');
  }catch(e){showToast('Rename failed: '+(e.message||e),'err');}
}

async function deleteGroup(gId,name){
  showConfirm(`Delete group "${name}"?`,'All messages and memberships will be deleted.',async()=>{
    try{
      const msgs=msgCache[gId]||[];
      if(msgs.length) await sb.from('message_reads').delete().in('message_id',msgs.map(m=>m.id));
      await sb.from('messages').delete().eq('group_id',gId);
      await sb.from('group_members').delete().eq('group_id',gId);
      const{error}=await sb.from('groups').delete().eq('id',gId);
      if(error) throw error;
      showToast(`Group "${name}" deleted.`,'ok');
      await loadGroupsTable();
    }catch(e){showToast('Delete failed: '+(e.message||e),'err');}
  },'Delete Group',true);
}

async function addMember(gId){
  const sel=G('as-'+gId);
  const uid=sel?sel.value:'';
  if(!uid){showToast('Select a user.','err');return;}
  try{
    const{data:ex}=await sb.from('group_members').select('id').eq('group_id',gId).eq('user_id',uid).maybeSingle();
    if(ex){showToast('User already in group.','err');return;}
    const{error}=await sb.from('group_members').insert({group_id:gId,user_id:uid});
    if(error) throw error;
    showToast(`"${uid}" added!`,'ok');
    await loadGroupsTable();
  }catch(e){showToast('Failed: '+(e.message||e),'err');}
}

async function removeMember(gId,uid){
  showConfirm(`Remove "${uid}" from this group?`,'They will lose access to this group chat.',async()=>{
    try{
      const{error}=await sb.from('group_members').delete().eq('group_id',gId).eq('user_id',uid);
      if(error) throw error;
      showToast(`"${uid}" removed.`,'ok');
      await loadGroupsTable();
    }catch(e){showToast('Failed: '+(e.message||e),'err');}
  },'Remove',true);
}

/* ══════════════════════════════════════════
   ADMIN — MESSAGES
══════════════════════════════════════════ */
async function renderAdminMessages(){
  G('aMainContent').innerHTML=`
    <div class="a-page-title">Message Monitor</div>
    <div class="a-page-sub">View all messages across every group</div>
    <div style="display:flex;gap:10px;margin-bottom:18px;align-items:center;">
      <select id="mfGrp" onchange="loadMsgsTable()" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 13px;color:var(--text1);font-family:var(--ff);font-size:13px;outline:none;">
        <option value="">All groups</option>
      </select>
      <span style="font-size:12px;color:var(--text3);" id="mTotal"></span>
    </div>
    <div class="a-card"><div id="msgsBody"><div class="load-box"><div class="spinner"></div></div></div></div>`;
  const{data:gData}=await sb.from('groups').select('*').order('id');
  if(gData) gData.forEach(g=>{const o=document.createElement('option');o.value=g.id;o.textContent=g.name;G('mfGrp').appendChild(o);});
  await loadMsgsTable();
}

async function loadMsgsTable(){
  const tb=G('msgsBody');if(!tb) return;
  tb.innerHTML='<div class="load-box"><div class="spinner"></div></div>';
  const gf=(G('mfGrp')||{}).value;
  try{
    let q=sb.from('messages').select('id,group_id,user_id,content,created_at').order('id',{ascending:false}).limit(300);
    if(gf) q=q.eq('group_id',gf);
    const{data,error}=await q;
    if(error) throw error;
    const tot=G('mTotal');if(tot) tot.textContent=data.length+' messages';
    tb.innerHTML=data.length?`
      <table class="a-table">
        <thead><tr><th>Time</th><th>Group</th><th>User</th><th>Message</th></tr></thead>
        <tbody>${data.map(m=>`<tr>
          <td style="font-size:11px;color:var(--text3);white-space:nowrap;">${fmtTime(m.created_at)}</td>
          <td style="color:var(--accent);">G${m.group_id}</td>
          <td style="font-family:var(--mono);font-size:11px;">${esc(m.user_id)}</td>
          <td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(m.content)}</td>
        </tr>`).join('')}</tbody>
      </table>`
    :'<div style="padding:16px;color:var(--text3);">No messages found.</div>';
  }catch(e){tb.innerHTML='<div style="padding:16px;color:var(--danger);">Failed to load.</div>';}
}

/* ══════════════════════════════════════════
   ADMIN — REQUESTS
══════════════════════════════════════════ */
async function renderAdminRequests(){
  G('aMainContent').innerHTML=`
    <div class="a-page-title">Signup Requests</div>
    <div class="a-page-sub">Approve or reject pending account requests.</div>
    <div class="a-card">
      <div class="a-card-head"><h3>Pending Requests</h3><span id="rCount">Loading…</span></div>
      <div id="reqBody"><div class="load-box"><div class="spinner"></div></div></div>
    </div>
    <div class="a-card">
      <div class="a-card-head"><h3>Rejected Requests</h3></div>
      <div id="rejBody"><div class="load-box"><div class="spinner"></div></div></div>
    </div>`;
  await loadRequestsTable();
}

async function loadRequestsTable(){
  try{
    const{data,error}=await sb.from('users').select('id,role,status').in('status',['pending','rejected']).order('id');
    if(error) throw error;
    const pending=(data||[]).filter(u=>u.status==='pending');
    const rejected=(data||[]).filter(u=>u.status==='rejected');

    // Update badge
    const badge=G('reqBadge');
    if(badge){
      if(pending.length){badge.textContent=pending.length;badge.classList.remove('hidden');}
      else{badge.classList.add('hidden');}
    }

    // Pending count
    const rc=G('rCount'); if(rc) rc.textContent=pending.length+' pending';

    // Pending table
    const pb=G('reqBody'); if(!pb) return;
    pb.innerHTML=pending.length?`
      <table class="a-table">
        <thead><tr><th>Username</th><th>Role</th><th>Actions</th></tr></thead>
        <tbody>${pending.map(u=>`<tr>
          <td><span style="font-family:var(--mono);font-size:12px;">${esc(u.id)}</span></td>
          <td><span class="badge user">user</span></td>
          <td><div class="td-actions">
            <button class="btn-p" style="font-size:12px;padding:5px 14px;" onclick="approveRequest('${escA(u.id)}')">✓ Approve</button>
            <button class="btn-danger" onclick="rejectRequest('${escA(u.id)}')">✗ Reject</button>
          </div></td>
        </tr>`).join('')}</tbody>
      </table>`
    :'<div style="padding:16px;color:var(--text3);">No pending requests.</div>';

    // Rejected table
    const rb=G('rejBody'); if(!rb) return;
    rb.innerHTML=rejected.length?`
      <table class="a-table">
        <thead><tr><th>Username</th><th>Actions</th></tr></thead>
        <tbody>${rejected.map(u=>`<tr>
          <td><span style="font-family:var(--mono);font-size:12px;">${esc(u.id)}</span></td>
          <td><div class="td-actions">
            <button class="btn-sm" onclick="approveRequest('${escA(u.id)}')">Re-approve</button>
            <button class="btn-danger" onclick="deleteUser('${escA(u.id)}')">Delete</button>
          </div></td>
        </tr>`).join('')}</tbody>
      </table>`
    :'<div style="padding:16px;color:var(--text3);">No rejected requests.</div>';
  }catch(e){
    const pb=G('reqBody');if(pb) pb.innerHTML='<div style="padding:16px;color:var(--danger);">Failed to load.</div>';
  }
}

async function approveRequest(uid){
  try{
    const{error}=await sb.from('users').update({status:'approved'}).eq('id',uid);
    if(error) throw error;
    showToast(`"${uid}" approved!`,'ok');
    await loadRequestsTable();
  }catch(e){showToast('Failed: '+(e.message||e),'err');}
}

async function rejectRequest(uid){
  showConfirm(`Reject "${uid}"?`,'They will not be able to log in.',async()=>{
    try{
      const{error}=await sb.from('users').update({status:'rejected'}).eq('id',uid);
      if(error) throw error;
      showToast(`"${uid}" rejected.`,'ok');
      await loadRequestsTable();
    }catch(e){showToast('Failed: '+(e.message||e),'err');}
  },'Reject',true);
}

async function loadPendingBadge(){
  try{
    const{count}=await sb.from('users').select('id',{count:'exact',head:true}).eq('status','pending');
    const badge=G('reqBadge');
    if(!badge) return;
    if(count>0){badge.textContent=count;badge.classList.remove('hidden');}
    else{badge.classList.add('hidden');}
  }catch(e){}
}

/* ══════════════════════════════════════════
   MODALS
══════════════════════════════════════════ */
function showConfirm(title,sub,onOk,okLabel='Confirm',danger=false){
  showModal(title,sub,async()=>{await onOk();return true;},okLabel,danger);
}

function showModal(title,sub,onOk,okLabel='OK',danger=false,extraHtml=''){
  const ov=G('modal-overlay');
  ov.classList.remove('hidden');
  ov.innerHTML=`<div class="modal-box">
    <div class="modal-title">${esc(title)}</div>
    ${sub?`<div class="modal-sub">${esc(sub)}</div>`:''}
    ${extraHtml}
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-p" id="modalOk" style="${danger?'background:var(--danger);':''}">${esc(okLabel)}</button>
    </div>
  </div>`;
  G('modalOk').onclick=async()=>{
    const result=await onOk();
    if(result!==false) closeModal();
  };
}

function closeModal(){const o=G('modal-overlay');o.classList.add('hidden');o.innerHTML='';}

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
function G(id){return document.getElementById(id);}
function val(id){return(G(id)||{}).value?.trim()||'';}
function esc(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function grpEmoji(n){
  n=(n||'').toLowerCase();
  if(n.includes('general')||n.includes('main'))return'💬';
  if(n.includes('dev')||n.includes('tech')||n.includes('code')||n.includes('eng'))return'💻';
  if(n.includes('design')||n.includes('ui')||n.includes('ux'))return'🎨';
  if(n.includes('sales')||n.includes('market'))return'📈';
  if(n.includes('ops')||n.includes('infra'))return'⚙️';
  if(n.includes('random')||n.includes('off'))return'🎲';
  if(n.includes('hr')||n.includes('people'))return'👥';
  if(n.includes('finance')||n.includes('account'))return'💰';
  return'📌';
}
let _tt;
function showToast(msg,type=''){
  const el=G('toast');
  el.textContent=msg;el.className='show '+type;
  clearTimeout(_tt);_tt=setTimeout(()=>{el.className='';},3200);
}
</script>
</body>
